<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉沢孝太郎"祝還暦"イベント 特設サイト</title>
    <!-- ⚠️ 検索エンジンに絶対に登録させない設定 -->
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <style>
        /* カウントダウンタイマー全体のデザイン */
        .countdown-container {
            margin: 15px auto 25px auto;
            padding: 15px 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #d4af37;
            border-radius: 6px;
            max-width: 450px;
        }
        .countdown-label {
            font-size: 0.9rem;
            color: #d4af37;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .countdown-display {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }
        .countdown-number {
            font-family: 'Georgia', serif;
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,184,0,0.6);
            line-height: 1;
        }
        .countdown-unit {
            font-size: 0.75rem;
            color: #cccccc;
            margin-top: 4px;
        }
        .countdown-expired {
            font-size: 1.2rem;
            color: #ffb800;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.jpg" alt="Celebrating 60th Birthday" class="logo-img">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Top</a></li>
                <li><a href="access.html">Access</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="ticket.html" class="btn-ticket">Ticket</a></li>
            </ul>
        </nav>
    </header>

    <div class="slider-background">
        <div class="slide slide1"></div>
        <div class="slide slide2"></div>
    </div>

    <main class="hero-scroll-container">
        
        <div class="retro-container">
            <h1 class="retro-title-main">吉沢孝太郎 "祝還暦" イベント</h1>
            
            <div class="retro-title-sub">
                <span class="small-prefix" style="font-size: 1.15rem !important;">元宝塚歌劇団花組男役</span>
                <span class="retro-star-name">真丘奈央</span>
                <span class="onstage-text">オンステージ</span>
            </div>

            <p class="retro-date-clean">2026.8.15 (Sat)</p>

            <p class="retro-time-clean" style="font-family: 'Georgia', sans-serif; font-size: 1.4rem; color: #ffffff; letter-spacing: 2px; margin-bottom: 25px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">
                Open 11:30am / Start 12:00pm
            </p>

            <!-- ⏰ 3. カウントダウンタイマー表示エリアを追加しました -->
            <div class="countdown-container">
                <div class="countdown-label">開演まであと</div>
                <div id="countdown" class="countdown-display">
                    <div class="countdown-item"><span id="days" class="countdown-number">00</span><span class="countdown-unit">日</span></div>
                    <div class="countdown-item"><span id="hours" class="countdown-number">00</span><span class="countdown-unit">時間</span></div>
                    <div class="countdown-item"><span id="minutes" class="countdown-number">00</span><span class="countdown-unit">分</span></div>
                    <div class="countdown-item"><span id="seconds" class="countdown-number">00</span><span class="countdown-unit">秒</span></div>
                </div>
            </div>

            <div class="retro-venue-box">
                <p class="venue-name">CLUB ROSSO</p>
                <p class="venue-address">渋谷区松濤1-29-1 渋谷クロスロードビルB1F</p>
                <p class="event-price" style="color: #ffb800 !important; font-size: 1.2rem !important;">料金：4,500円/人 <span style="font-size: 0.8em; font-weight: normal; margin-left: 4px;">(全席自由・ワンドリンク付)</span></p>
            </div>

            <a href="ticket.html" class="cta-button retro-btn">チケットを申し込む</a>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Event Organizer. All Rights Reserved.</p>
    </footer>

    <!-- ⏰ タイマーをリアルタイム駆動させるプログラムを追加しました -->
    <script>
        // 目標日時を設定 (2026年8月15日 12:00 PM 開演)
        const targetDate = new Date("2026/08/15 12:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // 各単位の計算
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // 画面の数字を書き換え（2桁表示に揃える）
            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');

            // イベント当日を過ぎた場合の表示
            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown").innerHTML = "<div class='countdown-expired'>本日のイベントは終了いたしました。</div>";
            }
        }

        // 1秒ごとにタイマーを更新する
        const timerInterval = setInterval(updateCountdown, 1000);
        updateCountdown(); // ページを開いた瞬間に1回目を実行
    </script>

</body>
</html>
